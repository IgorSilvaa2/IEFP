<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo image map</title>
</head>
<body>
    <h1>Demonstraçao de uma imagem map</h1>
    <img src="workplace.jpg" usemap="#image-map">

<map name="image-map">
    <area target="_blank" alt="Apple" title="Apple" href="https://www.apple.com/pt" coords="334,248,290,172" shape="rect">
    <area target="_blank" alt="Delta cafe" title="Delta cafe" href="https://deltacafes.com/" coords="338,300,44" shape="circle">
    <area target="_blank" alt="Asus" title="Asus" href="https://www.asus.com/pt" coords="37,43,35,344,273,344,270,46" shape="poly">
    <area target="_blank" alt="Elea" title="Elea" href="https://elea.pt/" coords="1,207,32,219,0,286" shape="poly">
</map>
</body>
</html>

<body>

            <th style="align-items: left;vertical-align: bottom;">Fevereiro></th>
            <th style="align-items: left;vertical-align: bottom;">Março></th>
        </tr>
        <tr>
            <td>
                <td style="height: 36px;align-items: right;vertical-align: top;"></td>
                <th style="vertical-align: middle;">10</th>
                <th style="vertical-align: middle;">15></th>
                <th style="vertical-align: middle;">15></th>
            </td>
        </tr>
    </table>
</body>
</html>

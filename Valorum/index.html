<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valorum</title>
    <style>
        body{
            background-image: url(fundo.png);
            background-size: cover; /* 2. Garante que a imagem cobre toda a tela sem distorcer */
            background-position: center; /* 3. Centra a imagem na horizontal e vertical */
            background-repeat: no-repeat; /* 4. Evita que a imagem se repita se a tela for muito grande */
            min-height: 100vh;  /* 5. Faz o fundo ocupar no mínimo a altura total da janela */
            margin: 0;  /* Margem zero para colar o menu nas bordas da tela */
            background-color:  rgba(10, 22, 40, 1);
   
        }
        header {
            display: flex;
            align-items: center;
            max-width: 1440px ;
            padding: 20px 40px;
            border-radius: 4px;
            margin-top: 25px;
            margin-left: auto;
            margin-right: auto;
            padding-top: 5px;
            padding-bottom: 5px;
            background-color: rgba(255, 255, 255, 0.04); /* 1. Fundo branco ou escuro bem transparente */ 
            backdrop-filter: blur(12px); /* 2. O SEGREDO: Desfoca tudo o que estiver ATRÁS do elemento */
            -webkit-backdrop-filter: blur(12px); /* Suporte para navegadores Safari */
            border: 1px solid rgba(255, 255, 255, 0.15);/* 3. Uma borda fina e clara para simular o reflexo do vidro */
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3); /* 5. Sombra suave para dar profundidade */
            

        }
        nav a{
            color: #b0b8c1;
            font-size: 20px;/* Aumenta o tamanho das letras do menu */
            fonte font-weight: 500; /* Deixa a letra ligeiramente mais espessa */
            text-decoration: none; /* remove o sublinhado */
            transition: color 0.3s; /* Faz a mudança de cor suave ao passar o rato */
        }
        nav {
            display: flex;
            gap: 30px;
             /* O TRUQUE: Empurra o menu para o centro exato da barra */
            margin-left: auto;
            margin-right: auto; 
}
        nav a:hover {
            color: #00ffc8;
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: #00ffc8;
            letter-spacing: 1px;
            font-family:Georgia, serif;
            margin: 0;
            padding-left: 40px;
        }
        h2{
            color: white;
            margin: 0;
            font-family:Georgia, serif;
        }
        h4{
            color: white;
            margin: 0;
            font-family:Georgia, serif;
        }
        .container {
        display: flex;
        max-width: 1440px;
        margin: 130px auto 0 auto; /* Afasta do header e centra na tela */
        padding: 0 40px;
        }
        .logo{
        margin-left: auto;
        margin-right: auto;
        }
        .texto1 {
        color: #ffffff;
        font-size: 6rem;          /* Letras grandes como na sua imagem */
        font-weight: bold;
        line-height: 1.10;        /* Deixa as linhas bem juntinhas na vertical */
        margin: 0 0 2px 0;       /* Cria o espaço ideal para o parágrafo de baixo */         
        display: flex;
        flex-direction: column;
        max-width: 640px; /* Limita a largura para o texto quebrar igual ao design */
        text-align: left;
        margin-top: 5%;
        }
        .texto2 {
        color: #b0b8c1;
        font-size: 1.9rem;
        font-weight: normal;
        line-height: 1.4;
        flex-direction: column;
        
        }
        /* Contentor para alinhar os botões lado a lado */
        .btn {
        background-color: rgba(255, 255, 255, 0.05); /* Fundo muito transparente */
        color: #cbd5e1; /* Cor do texto (branco acinzentado) */
        border: 1px solid rgba(255, 255, 255, 0.1); /* Borda subtil e transparente */
        border-radius: 4px; /* Cantos ligeiramente arredondados */
        padding: 10px 24px; /* Espaçamento interno (vertical e horizontal) */
        font-family: Georgia, serif; /* Fonte com serifa igual à da imagem */
        font-size: 16px;
        cursor: pointer;
        transition: background 0.3s ease; /* Efeito suave ao passar o rato */      
        }
        /* Efeito visual ao passar o rato (Hover) */
        .btn:hover {
        background-color: rgba(255, 255, 255, 0.1); /* Fica ligeiramente mais claro */
        }
        .botoes-container{
        display: flex;
        gap: 25px; /* Espaço entre os dois botões */
        }
        .marcas-footer{
            margin-top: 10%;
        }
    </style>
</head>
<body>

   <header>
        <div>
            <h1>Valorum</h1>
        </div>
        <nav >
            <a href="#docs">Docs <span style="font-size: 0.7rem;">▼</span></a>
            <a href="#community">Community <span style="font-size: 0.7rem;">▼</span></a>
            <a href="#valor">$Valor <span style="font-size: 0.7rem;">▼</span></a>
            <a href="#language"><span class="globe-icon">🌐</span></a>
        </nav>
          
   </header>
        

    <main>
        <div class="container">
            <div >
               <h2 class="texto1">where everyone can grow.</h2>
                <br><br>
                <p class="texto2">
                    A platform that democratizes access to capital, 
                    allowing good ideas to prosper regardless of the 
                    origin or financial level of those who create them.
                </p>
                <div class="botoes-container">
                    <button class="btn">launch app</button>
                    <button class="btn">learn more</button>
                </div>
            </div>

            <div class="logo">
                <img src="logo.png" alt="logo valorum" width="540px" >
            </div>


        </div>
    </main>


</body>
<footer>
    <div class="marcas-footer">
        <marquee behavior="" direction="">
                <img src="parceiros.png" alt="imagem patrocionio" width="auto"  margin-top: 200px;>
        </marquee>
        
    </div>
    
</footer>
</html>

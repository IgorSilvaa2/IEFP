<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valorum - Where Everyone Can Grow</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #0a1628 0%, #0d1f3c 50%, #051a2e 100%);
            color: #fff;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ===== HEADER ===== */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 2rem;
            backdrop-filter: blur(10px);
            background: rgba(10, 22, 40, 0.7);
            border-bottom: 1px solid rgba(0, 255, 200, 0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: #00ffc8;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        nav {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        nav a {
            color: #b0b8c1;
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        nav a:hover {
            color: #00ffc8;
        }

        .globe-icon {
            width: 24px;
            height: 24px;
            border: 1.5px solid #b0b8c1;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        nav a:hover .globe-icon {
            border-color: #00ffc8;
            color: #00ffc8;
        }

        /* ===== MAIN CONTENT ===== */
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }

        /* Background with stars effect */
        main::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #eee, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 60px 70px, #fff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 50px 50px, #fff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 130px 80px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 90px 10px, #fff, rgba(0,0,0,0));
            background-repeat: repeat;
            background-size: 200px 200px;
            opacity: 0.3;
            pointer-events: none;
            z-index: 1;
        }

        /* Background image */
        main::after {
            content: '';
            position: absolute;
            bottom: -10%;
            left: 50%;
            transform: translateX(-50%);
            width: 120%;
            height: 120%;
            background-image: url('background.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0.4;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
            max-width: 1400px;
            width: 100%;
            align-items: center;
            position: relative;
            z-index: 2;
        }

        .content-left {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        h2 {
            font-size: 3.5rem;
            font-weight: 700;
            line-height: 1.2;
            color: #ffffff;
            text-shadow: 0 2px 10px rgba(0, 255, 200, 0.2);
        }

        h4 {
            font-size: 1rem;
            font-weight: 400;
            line-height: 1.6;
            color: #a0a8b1;
            max-width: 500px;
        }

        .content-right {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .numeros-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .numeros-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 0 30px rgba(0, 255, 200, 0.3));
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        /* ===== FOOTER ===== */
        footer {
            background: rgba(10, 22, 40, 0.9);
            border-top: 1px solid rgba(0, 255, 200, 0.1);
            padding: 3rem 2rem;
            position: relative;
            z-index: 10;
        }

        .sponsors-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 2rem;
        }

        .sponsor-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 60px;
            opacity: 0.7;
            transition: opacity 0.3s ease;
            flex-shrink: 0;
        }

        .sponsor-logo:hover {
            opacity: 1;
        }

        .sponsor-logo img {
            max-height: 100%;
            max-width: 150px;
            object-fit: contain;
            filter: brightness(0.9);
        }

        .sponsor-text {
            font-size: 1.2rem;
            font-weight: 600;
            color: #b0b8c1;
            letter-spacing: 0.5px;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 1024px) {
            .container {
                grid-template-columns: 1fr;
                gap: 2rem;
            }

            h2 {
                font-size: 2.5rem;
            }

            .content-right {
                order: -1;
            }

            .numeros-container {
                max-width: 300px;
            }
        }

        @media (max-width: 768px) {
            header {
                padding: 1rem;
                flex-direction: column;
                gap: 1rem;
            }

            h1 {
                font-size: 1.4rem;
            }

            nav {
                gap: 1rem;
                font-size: 0.85rem;
            }

            nav a {
                font-size: 0.8rem;
            }

            main {
                padding: 1rem;
                min-height: auto;
            }

            .container {
                gap: 1.5rem;
            }

            h2 {
                font-size: 2rem;
            }

            h4 {
                font-size: 0.9rem;
            }

            .numeros-container {
                max-width: 250px;
            }

            .sponsors-container {
                gap: 1rem;
                padding: 1rem;
            }

            .sponsor-logo {
                height: 50px;
            }

            .sponsor-logo img {
                max-width: 120px;
            }

            .sponsor-text {
                font-size: 1rem;
            }
        }

        @media (max-width: 480px) {
            header {
                padding: 0.8rem;
            }

            h1 {
                font-size: 1.2rem;
            }

            nav {
                gap: 0.8rem;
            }

            nav a {
                font-size: 0.7rem;
            }

            main {
                padding: 1rem 0.5rem;
            }

            h2 {
                font-size: 1.5rem;
            }

            h4 {
                font-size: 0.85rem;
            }

            .numeros-container {
                max-width: 200px;
            }

            .sponsors-container {
                gap: 0.8rem;
                padding: 1rem 0.5rem;
            }

            .sponsor-logo {
                height: 40px;
            }

            .sponsor-logo img {
                max-width: 100px;
            }

            .sponsor-text {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <!-- HEADER -->
    <header>
        <h1>Valorum</h1>
        <nav>
            <a href="#docs">docs <span style="font-size: 0.7rem;">▼</span></a>
            <a href="#community">community <span style="font-size: 0.7rem;">▼</span></a>
            <a href="#valor">$valor <span style="font-size: 0.7rem;">▼</span></a>
            <a href="#language">
                <span class="globe-icon">🌐</span>
            </a>
        </nav>
    </header>

    <!-- MAIN CONTENT -->
    <main>
        <div class="container">
            <div class="content-left">
                <h2>where everyone can grow.</h2>
                <h4>A platform that democratizes access to capital, allowing good ideas to prosper regardless of the origin or financial level of those who create them.</h4>
            </div>
            <div class="content-right">
                <div class="numeros-container">
                    <img src="numeros.jpg" alt="09 - Platform Network">
                </div>
            </div>
        </div>
    </main>

    <!-- FOOTER -->
    <footer>
        <div class="sponsors-container">
            <div class="sponsor-logo">
                <span class="sponsor-text">deepseek</span>
            </div>
            <div class="sponsor-logo">
                <span class="sponsor-text">MOJANG</span>
            </div>
            <div class="sponsor-logo">
                <span class="sponsor-text">SAMSUNG</span>
            </div>
            <div class="sponsor-logo">
                <span class="sponsor-text">Google</span>
            </div>
            <div class="sponsor-logo">
                <span class="sponsor-text">Microsoft</span>
            </div>
            <div class="sponsor-logo">
                <span class="sponsor-text">ambipar</span>
            </div>
            <div class="sponsor-logo">
                <span class="sponsor-text">mastercard</span>
            </div>
        </div>
    </footer>
</body>
</html>
